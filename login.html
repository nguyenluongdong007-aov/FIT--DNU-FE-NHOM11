<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - StayEasy Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card login-glass-card p-4 p-md-5 text-white">
                    <div class="text-center mb-4">
                        <div class="bg-white text-orange rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 75px; height: 75px;">
                            <i class="fa-solid fa-hotel fa-2x"></i>
                        </div>
                        <h3 class="fw-extrabold mb-1">StayEasy Admin</h3>
                        <p class="text-white-50 small">Đăng nhập để vào hệ thống quản trị</p>
                    </div>
                    <form id="stayeasy-login-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase text-white-50" style="letter-spacing: 1px;">Tài khoản</label>
                            <div class="input-group rounded-3 overflow-hidden shadow-sm">
                                <span class="input-group-text input-group-text-glass"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control form-control-glass shadow-none" id="username" placeholder="Nhập tên đăng nhập" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase text-white-50" style="letter-spacing: 1px;">Mật khẩu</label>
                            <div class="input-group rounded-3 overflow-hidden shadow-sm">
                                <span class="input-group-text input-group-text-glass"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control form-control-glass shadow-none" id="password" placeholder="Nhập mật khẩu" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-orange w-100 rounded-pill fw-bold py-3 shadow-lg mb-4">
                            Đăng Nhập Quản Trị <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                        </button>
                        <div class="text-center">
                            <a href="index.html" class="text-white text-decoration-none small opacity-75 hover-white d-inline-block" style="transition: all 0.3s ease;">
                                <i class="fa-solid fa-arrow-left me-1"></i> Quay lại trang chủ Khách sạn
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
