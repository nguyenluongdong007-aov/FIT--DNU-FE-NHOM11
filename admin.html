<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - StayEasy</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/Admin.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary-dark sticky-top shadow-sm py-3">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 fw-extrabold d-flex align-items-center">
                <i class="fa-solid fa-chart-pie text-accent me-2"></i> StayEasy Workspace
            </span>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small d-none d-md-block"><i class="fa-solid fa-user-shield me-1"></i> Quản trị viên</span>
                <a href="index.html" class="btn btn-light btn-sm rounded-pill px-3 fw-bold"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Trở về trang khách</a>
            </div>
        </div>
    </nav>
    <div class="container-fluid px-4 mt-4 mb-5">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-extrabold text-primary-dark mb-0">Tổng quan hệ thống</h2>
                    <button class="btn btn-accent rounded-pill px-4 fw-bold shadow-sm" onclick="openRoomModal()">
                        <i class="fa-solid fa-plus me-1"></i> Thêm Phòng Mới
                    </button>
                </div>
                <div class="dashboard-card card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4 rounded-top-4">
                        <ul class="nav nav-tabs custom-tabs" id="adminTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#rooms-tab">
                                    <i class="fa-solid fa-door-open me-1"></i> Quản lý Phòng
                                </button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link fw-bold" data-bs-toggle="tab" data-bs-target="#bookings-tab">
                                    <i class="fa-solid fa-clipboard-list me-1"></i> Đơn Đặt Phòng
                                </button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body p-4">
                        <div class="tab-content" id="adminTabsContent">
                            <div class="tab-pane fade show active" id="rooms-tab">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle custom-table">
                                        <thead class="table-light">
                                            <tr>
                                                <th>ID</th>
                                                <th>Hình ảnh</th>
                                                <th>Tên Phòng</th>
                                                <th>Phân Loại</th>
                                                <th>Giá/Đêm</th>
                                                <th>Sức chứa</th>
                                                <th class="text-end">Hành động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="admin-room-list">
                                            </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="bookings-tab">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle custom-table">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Mã Đơn</th>
                                                <th>Khách Hàng</th>
                                                <th>Phòng Đặt</th>
                                                <th>Lịch trình (Nhận - Trả)</th>
                                                <th>Tổng Tiền</th>
                                                <th>Trạng Thái</th>
                                                <th class="text-end">Hành động</th>
                                            </tr>
                                        </thead>
                                        <tbody id="admin-booking-list">
                                            </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="roomFormModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-primary-dark text-white border-0 py-3">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i>Thông tin phòng</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-light">
                    <form id="room-form">
                        <input type="hidden" id="room-id">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-primary-dark small">Tên phòng</label>
                            <input type="text" class="form-control rounded-3 border-0 shadow-sm" id="room-name" required placeholder="VD: Phòng Deluxe Hướng Biển">
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label fw-bold text-primary-dark small">Loại phòng</label>
                                <select class="form-select rounded-3 border-0 shadow-sm" id="room-type">
                                    <option value="Standard">Standard</option>
                                    <option value="Deluxe">Deluxe</option>
                                    <option value="Homestay">Homestay</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-bold text-primary-dark small">Số khách tối đa</label>
                                <input type="number" class="form-control rounded-3 border-0 shadow-sm" id="room-guests" required min="1" placeholder="VD: 2">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-primary-dark small">Giá/Đêm (VND)</label>
                            <input type="number" class="form-control rounded-3 border-0 shadow-sm" id="room-price" required placeholder="VD: 1500000">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary-dark small">Link hình ảnh (URL)</label>
                            <input type="text" class="form-control rounded-3 border-0 shadow-sm" id="room-img" required placeholder="https://...">
                        </div>
                        <button type="submit" class="btn btn-accent w-100 rounded-pill fw-bold py-2 shadow-sm">Lưu Dữ Liệu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Js/utils.js"></script>
    <script src="Js/api.js"></script>
    <script src="Js/admin.js"></script>
</body>
</html>
